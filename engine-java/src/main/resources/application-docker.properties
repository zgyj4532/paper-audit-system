# ============================================================
# Profile: docker
# 适用场景：
#   1. Windows/Mac 本地通过 docker-compose up 启动（本地联调）
#   2. 服务器上通过 docker-compose up 启动（生产部署）
# 特点：连接真实 PostgreSQL + Redis，与生产环境完全一致
#
# 注意：数据库地址/密码由 docker-compose.yml 中的环境变量注入
#       无需手动修改此文件
# ============================================================

# ------ 数据库：PostgreSQL（由环境变量覆盖，此处为默认值）------
# Docker Compose 会通过环境变量 SPRING_DATASOURCE_URL 覆盖此值
spring.datasource.url=jdbc:postgresql://postgres:5432/auditor_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=auditor_user
spring.datasource.password=auditor_pass_2024
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update：保留历史数据，仅新增字段/表（不删除已有数据）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# HikariCP 连接池配置（生产级别）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# H2 控制台关闭（生产环境不暴露）
spring.h2.console.enabled=false

# ------ Redis：启用真实 Redis 连接 ------
# Docker Compose 会通过环境变量 SPRING_DATA_REDIS_HOST 覆盖此值
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=auditor_redis_2024
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1

# Redis 缓存配置（规则模板缓存 TTL 为 1 小时）
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
