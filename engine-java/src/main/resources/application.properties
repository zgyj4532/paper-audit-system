# ============================================================
# AI Auditor Engine-Java 主配置文件
#
# Profile 说明：
#   local  (默认) - 直接 mvn spring-boot:run，使用 H2 内嵌数据库
#   docker        - Docker Compose 启动，使用真实 PostgreSQL + Redis
#   prod          - 服务器生产环境（与 docker 配置相同，可按需微调）
#
# 切换方式：
#   本地 Maven：  mvn spring-boot:run（自动使用 local）
#   Docker 启动：docker-compose up（自动注入 SPRING_PROFILES_ACTIVE=docker）
#   手动指定：    mvn spring-boot:run -Dspring-boot.run.profiles=docker
# ============================================================

# 默认激活 local profile（直接 mvn spring-boot:run 时使用）
spring.profiles.active=local

# ============================================================
# Spring Boot HTTP 端口（所有 profile 共用）
# ============================================================
server.port=${ENGINE_JAVA_HTTP_PORT:8081}

# ============================================================
# Spring Batch 配置（所有 profile 共用）
# ============================================================
spring.batch.jdbc.initialize-schema=always

# ============================================================
# 日志级别配置（所有 profile 共用）
# ============================================================
logging.level.com.auditor.engine=INFO
logging.level.org.drools=WARN
logging.level.io.grpc=INFO
logging.level.org.springframework.batch=INFO

# ============================================================
# 控制台日志编码（解决 Windows PowerShell/CMD 中文乱码）
# ============================================================
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# ============================================================
# Spring Boot Actuator（健康检查端点，供 Docker healthcheck 使用）
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
