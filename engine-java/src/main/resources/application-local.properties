# ============================================================
# Profile: local（默认）
# 适用场景：Windows/Mac 本地直接运行 mvn spring-boot:run
# 特点：无需安装任何外部服务，开箱即用
# ============================================================

# ------ 数据库：H2 内嵌（内存模式，随 JVM 启动/销毁）------
spring.datasource.url=jdbc:h2:mem:auditor_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 控制台（浏览器访问 http://localhost:8081/h2-console 可查看数据）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ------ Redis：本地禁用，避免连接失败 ------
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
