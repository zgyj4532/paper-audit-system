name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Python checks via uv
        run: |
          uv venv --python 3.11
          uv sync --extra dev
          uv run --extra dev ruff check .
          uv run --extra dev black --check .
          uv run --extra dev pytest -q

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Check rustfmt
        run: |
          cd rust_engine
          rustup component add rustfmt || true
          cargo fmt -- --check
      - name: Run cargo test
        run: |
          cd rust_engine
          cargo test --verbose
