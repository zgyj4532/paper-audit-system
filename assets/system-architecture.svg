<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">paper-audit-system architecture</title>
  <desc id="desc">Product-style architecture diagram showing the Python control plane, AI workflow, vector retrieval, and Rust document engine.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1730"/>
      <stop offset="100%" stop-color="#101f3e"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="pythonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="rustGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 z" fill="#cbd5e1"/>
    </marker>
    <style>
      .title { font: 700 38px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #cbd5e1; }
      .kicker { font: 700 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; letter-spacing: 1.8px; fill: #60a5fa; }
      .section { font: 700 20px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #ffffff; }
      .label { font: 700 17px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #f8fafc; }
      .small { font: 400 14px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #cbd5e1; }
      .tiny { font: 600 12px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #dbeafe; letter-spacing: 0.6px; }
      .mono { font: 600 13px 'Consolas', 'SFMono-Regular', monospace; fill: #e2e8f0; }
      .chip { font: 700 12px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #dbeafe; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1280" cy="120" r="170" fill="url(#heroGlow)"/>
  <circle cx="260" cy="120" r="110" fill="#22c55e" opacity="0.08"/>
  <circle cx="240" cy="820" r="180" fill="#38bdf8" opacity="0.08"/>
  <circle cx="1410" cy="820" r="140" fill="#fb923c" opacity="0.08"/>

  <text x="80" y="74" class="kicker">PRODUCT ARCHITECTURE</text>
  <text x="80" y="122" class="title">paper-audit-system</text>
  <text x="80" y="156" class="subtitle">Python 负责控制面、任务与审查编排，Rust 负责文档解析与批注回写，ChromaDB 负责本地召回，Qwen 负责最终核验。</text>

  <!-- hero cards -->
  <g filter="url(#shadow)">
    <rect x="70" y="200" width="1460" height="180" rx="28" fill="rgba(15,23,42,0.88)" stroke="rgba(148,163,184,0.24)"/>
    <rect x="100" y="232" width="340" height="116" rx="22" fill="url(#pythonGrad)"/>
    <rect x="470" y="232" width="340" height="116" rx="22" fill="url(#aiGrad)"/>
    <rect x="840" y="232" width="340" height="116" rx="22" fill="#1f2937" stroke="rgba(148,163,184,0.2)"/>
    <rect x="1210" y="232" width="290" height="116" rx="22" fill="url(#rustGrad)"/>
  </g>

  <text x="128" y="270" class="section">Python Control Plane</text>
  <text x="128" y="296" class="small">FastAPI 路由 / 任务队列 / 报告交付</text>
  <text x="128" y="320" class="tiny">UPLOAD · TASK · REPORT · DOWNLOAD</text>

  <text x="498" y="270" class="section">AI Workflow</text>
  <text x="498" y="296" class="small">LangGraph 切片审查 / 一致性检查 / 引用核验</text>
  <text x="498" y="320" class="tiny">REVIEW · VERIFY · CONSISTENCY</text>

  <text x="868" y="270" class="section">Recall + Verdict</text>
  <text x="868" y="296" class="small">ChromaDB 本地召回候选，Qwen 输出最终判定</text>
  <text x="868" y="320" class="tiny">RAG RETRIEVAL + LLM JUDGEMENT</text>

  <text x="1238" y="270" class="section">Rust Document Engine</text>
  <text x="1238" y="296" class="small">解析、坐标、排版、批注写回</text>
  <text x="1238" y="320" class="tiny">PARSE · LAYOUT · ANNOTATE</text>

  <!-- flow connectors -->
  <line x1="440" y1="290" x2="470" y2="290" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="810" y1="290" x2="840" y2="290" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1180" y1="290" x2="1210" y2="290" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- lower control strip -->
  <g filter="url(#shadow)">
    <rect x="70" y="420" width="1460" height="150" rx="28" fill="rgba(15,23,42,0.72)" stroke="rgba(148,163,184,0.18)"/>
  </g>

  <text x="100" y="458" class="label">Python 业务能力</text>
  <rect x="100" y="478" width="148" height="34" rx="17" fill="#1d4ed8" opacity="0.95"/>
  <text x="126" y="500" class="chip">任务调度</text>
  <rect x="258" y="478" width="148" height="34" rx="17" fill="#0f766e" opacity="0.95"/>
  <text x="284" y="500" class="chip">AI 审查</text>
  <rect x="416" y="478" width="148" height="34" rx="17" fill="#334155" opacity="0.95"/>
  <text x="442" y="500" class="chip">ChromaDB</text>
  <rect x="574" y="478" width="148" height="34" rx="17" fill="#c2410c" opacity="0.95"/>
  <text x="600" y="500" class="chip">Qwen API</text>
  <rect x="732" y="478" width="148" height="34" rx="17" fill="#1d4ed8" opacity="0.65"/>
  <text x="758" y="500" class="chip">报告生成</text>

  <text x="940" y="458" class="label">Rust 文档能力</text>
  <rect x="940" y="478" width="156" height="34" rx="17" fill="#7c2d12" opacity="0.95"/>
  <text x="966" y="500" class="chip">OpenXML 解析</text>
  <rect x="1106" y="478" width="156" height="34" rx="17" fill="#92400e" opacity="0.95"/>
  <text x="1132" y="500" class="chip">排版建模</text>
  <rect x="1272" y="478" width="156" height="34" rx="17" fill="#b45309" opacity="0.95"/>
  <text x="1298" y="500" class="chip">批注回写</text>
  <rect x="1438" y="478" width="72" height="34" rx="17" fill="#475569" opacity="0.95"/>
  <text x="1453" y="500" class="chip">Axum</text>

  <!-- bottom panels -->
  <g filter="url(#shadow)">
    <rect x="70" y="610" width="700" height="280" rx="28" fill="rgba(15,23,42,0.86)" stroke="rgba(96,165,250,0.18)"/>
    <rect x="830" y="610" width="700" height="280" rx="28" fill="rgba(15,23,42,0.86)" stroke="rgba(251,146,60,0.18)"/>
  </g>

  <text x="100" y="652" class="label">Python 核心流转</text>
  <text x="100" y="684" class="small">1. 上传文件后创建任务，进入 SQLite 任务队列。</text>
  <text x="100" y="712" class="small">2. 调用 Rust /parse 提取 sections、样式与坐标。</text>
  <text x="100" y="740" class="small">3. 执行规则引擎、Chunk 审查、参考文献核验。</text>
  <text x="100" y="768" class="small">4. 用 Qwen 给出最终 verdict，生成报告并返回下载。</text>

  <text x="860" y="652" class="label">Rust 核心流转</text>
  <text x="860" y="684" class="small">1. 读取 DOCX OpenXML，恢复结构、样式与段落。</text>
  <text x="860" y="712" class="small">2. 建模排版信息，推导批注位置与页码映射。</text>
  <text x="860" y="740" class="small">3. 注入 comments.xml 与关系文件，生成新文档。</text>
  <text x="860" y="768" class="small">4. 通过 HTTP/JSON 与 Python 协作，无需 gRPC。</text>

  <line x1="430" y1="610" x2="430" y2="560" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1190" y1="610" x2="1190" y2="560" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
